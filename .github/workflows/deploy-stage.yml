name: Build & Deploy Staging

on:
  push:
    branches: [develop]

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install & validate imports
        run: |
          pip install -r requirements.txt
          python -c "from api.models.responses import GlobalContextResponse, TrendData, TrendInfo; print('Models OK')"
          python -c "from services.trend_analyzer import analyze_candles; print('Trend analyzer OK')"
          python -c "from api.routes.global_context import router; print('Routes OK')"

      - name: Check file size limits
        run: |
          EXIT=0
          for f in $(find api services config utils -name '*.py' -not -name '__init__.py'); do
            LINES=$(wc -l < "$f")
            if [ "$LINES" -gt 300 ]; then
              echo "FAIL: $f has $LINES lines (max 300)"
              EXIT=1
            fi
          done
          exit $EXIT

  docker-build-test:
    name: Docker Build & Health Check
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t yahoo-services:${{ github.sha }} .

      - name: Health check in container
        run: |
          docker run -d --name test-yahoo \
            -e ENVIRONMENT=development \
            -e REDIS_ENABLED=false \
            -p 8085:8085 \
            yahoo-services:${{ github.sha }}
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8085/health || echo "000")
          docker logs test-yahoo
          docker stop test-yahoo
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed: $STATUS"
            exit 1
          fi
          echo "Docker health check passed"

  deploy:
    name: Deploy to Staging
    runs-on: self-hosted
    needs: docker-build-test
    environment: staging
    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop

      - name: Stop existing containers
        run: docker compose --profile stage down 2>/dev/null || true

      - name: Build & start staging
        run: docker compose --profile stage up -d --build

      - name: Wait for service
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8285/health > /dev/null 2>&1 && echo "Up after ${i}s" && break
            sleep 1
          done

      - name: Health check
        run: |
          RESPONSE=$(curl -sf http://localhost:8285/health)
          STATUS=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['status'])")
          echo "Health: $STATUS"
          [ "$STATUS" = "healthy" ] || exit 1

      - name: Smoke test global-context
        run: |
          RESPONSE=$(curl -sf http://localhost:8285/api/v1/global-context)
          python3 -c "
          import sys, json
          data = json.loads('''$RESPONSE''')
          for key in ['sp500','nasdaq','dow_jones','vix','gold','usd_inr','crude_oil']:
              assert key in data, f'Missing {key}'
              trend = 'trend:' + data[key]['trend']['short_term']['regime'] if data[key].get('trend') else 'no-trend'
              print(f'{key}: OK ({trend})')
          print('Staging smoke test passed')
          "

      - name: Summary
        if: success()
        run: |
          echo "Staging live on :8285 — health OK, global-context OK"

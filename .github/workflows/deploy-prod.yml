name: Deploy Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build & Deploy Production
    runs-on: self-hosted
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Validate file size limits (max 300 lines)
        run: |
          EXIT=0
          for f in $(find api services config utils -name '*.py' -not -name '__init__.py'); do
            LINES=$(wc -l < "$f")
            if [ "$LINES" -gt 300 ]; then
              echo "FAIL: $f has $LINES lines (max 300)"
              EXIT=1
            fi
          done
          exit $EXIT

      - name: Stop existing containers
        run: docker compose --profile prod down 2>/dev/null || true

      - name: Build image & start production
        run: docker compose --profile prod up -d --build --no-cache

      - name: Wait for service
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8185/health > /dev/null 2>&1 && echo "Up after ${i}s" && break
            sleep 1
          done

      - name: Health check
        run: |
          RESPONSE=$(curl -sf http://localhost:8185/health)
          STATUS=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['status'])")
          echo "Health: $STATUS"
          [ "$STATUS" = "healthy" ] || exit 1

      - name: Smoke test global-context
        run: |
          RESPONSE=$(curl -sf http://localhost:8185/api/v1/global-context)
          python3 -c "
          import sys, json
          data = json.loads('''$RESPONSE''')
          for key in ['sp500','nasdaq','dow_jones','vix','gold','usd_inr','crude_oil']:
              assert key in data, f'Missing {key}'
              trend = 'trend:' + data[key]['trend']['short_term']['regime'] if data[key].get('trend') else 'no-trend'
              print(f'{key}: OK ({trend})')
          print('Production smoke test passed')
          "
